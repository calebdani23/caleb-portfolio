<rect x="70" y="875" width="290" height="60" rx="18" fill="#111827" stroke="#334155" stroke-width="1.2" opacity="0.95"/>
<text x="215" y="900" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#f8fafc">Redacted for public sharing</text>
<text x="215" y="922" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" fill="#94a3b8">No private repos, secrets, tokens or internal endpoints.</text>

