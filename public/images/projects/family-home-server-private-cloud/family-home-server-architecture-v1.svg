<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Family home server architecture diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font-family: Inter, Arial, sans-serif; font-size: 42px; font-weight: 800; fill: #f8fafc; }
      .subtitle { font-family: Inter, Arial, sans-serif; font-size: 20px; fill: #cbd5e1; }
      .section { font-family: Inter, Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
      .body { font-family: Inter, Arial, sans-serif; font-size: 17px; fill: #334155; }
      .small { font-family: Inter, Arial, sans-serif; font-size: 15px; fill: #475569; }
      .pill { font-family: Inter, Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #0f172a; }
      .box { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 2; rx: 28; filter: url(#shadow); }
      .inner { fill: #eef6ff; stroke: #bfdbfe; stroke-width: 2; rx: 20; }
      .storage { fill: #ecfdf5; stroke: #99f6e4; stroke-width: 2; rx: 20; }
      .arrow { stroke: #e2e8f0; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .arrowDark { stroke: #0f766e; stroke-width: 4; fill: none; marker-end: url(#arrowheadDark); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#e2e8f0"/>
    </marker>
    <marker id="arrowheadDark" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#0f766e"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <circle cx="1200" cy="140" r="190" fill="#14b8a6" opacity="0.12"/>
  <circle cx="190" cy="760" r="240" fill="#38bdf8" opacity="0.10"/>

  <text x="80" y="95" class="title">Family Home Server / Private Family Cloud</text>
  <text x="82" y="132" class="subtitle">Redacted architecture view — no IPs, private usernames, real device names, or sensitive paths shown</text>

  <rect x="70" y="245" width="290" height="235" class="box"/>
  <text x="105" y="295" class="section">Family Devices</text>
  <text x="105" y="335" class="body">Phones, tablets, and computers</text>
  <text x="105" y="365" class="body">connect to shared storage</text>
  <text x="105" y="395" class="body">through local network access</text>
  <rect x="105" y="420" width="205" height="38" rx="19" fill="#dbeafe"/>
  <text x="128" y="445" class="pill">Non-technical use</text>

  <rect x="500" y="205" width="400" height="340" class="box"/>
  <text x="535" y="255" class="section">Reused Laptop Host</text>
  <rect x="535" y="285" width="330" height="58" class="inner"/>
  <text x="560" y="321" class="body">Ubuntu Server base system</text>
  <rect x="535" y="365" width="330" height="58" class="inner"/>
  <text x="560" y="401" class="body">CasaOS visual dashboard</text>
  <rect x="535" y="445" width="330" height="58" class="inner"/>
  <text x="560" y="481" class="body">Docker app layer</text>

  <rect x="1020" y="245" width="310" height="235" class="box"/>
  <text x="1055" y="295" class="section">Storage Layer</text>
  <rect x="1055" y="325" width="230" height="45" class="storage"/>
  <text x="1080" y="354" class="body">Private folders</text>
  <rect x="1055" y="385" width="230" height="45" class="storage"/>
  <text x="1080" y="414" class="body">Shared family folders</text>
  <rect x="1055" y="445" width="230" height="45" class="storage"/>
  <text x="1080" y="474" class="body">App and backup data</text>

  <rect x="250" y="640" width="395" height="175" class="box"/>
  <text x="285" y="690" class="section">Local Access</text>
  <text x="285" y="730" class="body">SMB shares for home network file access</text>
  <text x="285" y="760" class="small">Designed for simple family file usage</text>

  <rect x="760" y="640" width="395" height="175" class="box"/>
  <text x="795" y="690" class="section">Secure Remote Access</text>
  <text x="795" y="730" class="body">Tailscale private network access</text>
  <text x="795" y="760" class="small">No public router exposure shown or required</text>

  <path d="M360 360 C415 360 430 360 500 360" class="arrow"/>
  <path d="M900 360 C960 360 975 360 1020 360" class="arrow"/>
  <path d="M700 545 C640 585 550 610 450 640" class="arrow"/>
  <path d="M700 545 C760 585 850 610 955 640" class="arrow"/>
  <path d="M1175 480 C1130 555 1080 605 1015 640" class="arrowDark"/>
  <path d="M215 480 C260 555 330 605 445 640" class="arrowDark"/>

  <rect x="80" y="165" width="420" height="44" rx="22" fill="#e2e8f0" opacity="0.95"/>
  <text x="106" y="193" class="pill">Purpose: private family file cloud at home</text>

  <rect x="900" y="165" width="420" height="44" rx="22" fill="#ccfbf1" opacity="0.95"/>
  <text x="930" y="193" class="pill">Privacy: public diagram excludes sensitive details</text>

  <text x="80" y="865" class="small" fill="#cbd5e1">Architecture v1 — sanitized for portfolio/documentation use.</text>
</svg>
